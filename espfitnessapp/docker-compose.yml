services:
  postgres:
    image: postgres:16-alpine
    container_name: espfitness_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: espfitness
      POSTGRES_PASSWORD: espfitness_dev
      POSTGRES_DB: espfitness
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U espfitness -d espfitness"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
